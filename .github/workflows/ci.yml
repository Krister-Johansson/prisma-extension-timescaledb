name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token; no job here needs write access.
permissions:
  contents: read

jobs:
  build-test:
    name: build + unit/type tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run coverage      # runs unit tests + enforces coverage thresholds
      - run: npm run test:types
      - run: npm run attw
      - name: Upload coverage report
        if: matrix.node == 20
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          # Best-effort: never fail CI on an upload hiccup or a not-yet-set token.
          fail_ci_if_error: false

  integration:
    name: integration (real TimescaleDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24: Testcontainers' Docker client (undici) needs a newer runtime than
          # Node 20 (which fails with `webidl.util.markAsUncloneable is not a function`).
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # ubuntu-latest runners ship Docker, so Testcontainers can run the reset-safety proof.
      - run: npm run test:integration

  coverage-comment:
    name: coverage comment
    needs: build-test
    # PRs only — there's no PR to comment on for pushes to main. Kept as its own job
    # so the pull-requests:write token never covers a job that runs project code
    # (build-test stays contents:read). It consumes the coverage artifact only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage
      - name: Comment coverage summary on the PR
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
