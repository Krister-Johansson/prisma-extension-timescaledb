name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token; no job here needs write access.
permissions:
  contents: read

jobs:
  build-test:
    name: build + unit/type tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run coverage      # runs unit tests + enforces coverage thresholds
      - run: npm run test:types
      - run: npm run attw
      - name: Upload coverage report
        if: matrix.node == 20
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          # Best-effort: never fail CI on an upload hiccup or a not-yet-set token.
          fail_ci_if_error: false

  integration:
    name: integration (real TimescaleDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 24: Testcontainers' Docker client (undici) needs a newer runtime than
          # Node 20 (which fails with `webidl.util.markAsUncloneable is not a function`).
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # ubuntu-latest runners ship Docker, so Testcontainers can run the reset-safety proof.
      - run: npm run test:integration
